<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Happy Birthday 🌸</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="stars"></div>

<!-- LANDING -->

<button onclick="nextScreen('story')">

Start Adventure ✨

</button>

</section>

<!-- STORY -->
  <!-- GAME -->
  <!-- GIFT SCREEN -->
  <section id="letter" class="screen">

<div class="box">

<h2>💌</h2>

<p id="letterText">

Loading...

</p>

</div>

</section>

<section id="gift" class="screen">

<h2>A Magical Gift Appeared ✨</h2>

<p>Click the gift 3 times to open it.</p>

<div id="giftBox">

🎁

</div>

<div id="score">

Stars: 0 / 15

</div>

<div id="gameArea">

<div id="basket"></div>

</div>

</section>

<section id="story" class="screen">

<div class="box">

<h2>🌙</h2>

<p id="dialogue">

Hello...

</p>

</button>

</div>

</section>

<script src="script.js"></script>
