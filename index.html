<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Moonlight 🌙</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="stars"></div>

<!-- LANDING -->

<section id="landing" class="screen active">

<h1>Happy Birthday 🌸</h1>

<p>A tiny magical adventure awaits...</p>

<button id="startBtn">

✨ Start Adventure ✨

</button>

</section>

<!-- STORY -->

<section id="story" class="screen">

<div class="dialog">

<h2>🌙</h2>

<p id="dialogue"></p>

<button id="nextBtn">

Continue →

</button>

</div>

</section>

<!-- GAME -->

<section id="game" class="screen">

<h2>

⭐ Collect 15 Stars ⭐

</h2>

<p>

Catch all the stars to unlock the gift.

</p>

<div id="score">

Stars : 0 / 15

</div>

<div id="gameArea">

<div id="basket"></div>

</div>

</section>

<!-- GIFT -->

<section id="gift" class="screen">

<h2>

🎁 Magical Gift

</h2>

<p>

Click three times to open it.

</p>

<div id="giftBox">

🎁

</div>

<div id="giftMessage"></div>

</section>

<!-- LETTER -->

<section id="letter" class="screen">

<div class="dialog">

<h2>💌</h2>

<p id="letterText"></p>

</div>

</section>

<!-- END -->

<section id="ending" class="screen">

<h1>🌙</h1>

<h2>

Happy Birthday

</h2>

<p>

Thank you for taking this little adventure.

</p>

<h3>

Made with ❤️

<br><br>

by

<br><br>

Swarup

</h3>

<button id="restartBtn">

Replay Adventure

</button>

</section>

<script src="script.js"></script>

</body>

</html>
